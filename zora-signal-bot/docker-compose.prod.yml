version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Zora Signal Bot — docker-compose.prod.yml
#
# Differences from docker-compose.yml (dev):
#   - No source mounts (immutable image)
#   - No port exposure for DB/Redis (internal network only)
#   - Resource limits on every container
#   - Restart policy: always
#   - Postgres with WAL archiving hint
#   - Single uvicorn worker (scale with replicas behind a load balancer)
#   - Secrets via env_file only (never in image layers)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  env_file: .env.prod
  environment:
    APP_ENV: production
    POSTGRES_HOST: db
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zora_signal}
      POSTGRES_USER: ${POSTGRES_USER:-zora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zora}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  migrate:
    image: ${IMAGE_TAG:-zora-signal-bot:latest}
    <<: *app-env
    command: alembic upgrade head
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging: *logging

  api:
    image: ${IMAGE_TAG:-zora-signal-bot:latest}
    <<: *app-env
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 1
        --log-level warning
        --no-access-log
    ports:
      - "127.0.0.1:8000:8000"   # expose only to localhost (nginx sits in front)
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: ${IMAGE_TAG:-zora-signal-bot:latest}
    <<: *app-env
    command: >
      celery -A app.jobs.celery_app worker
        --loglevel=warning
        --concurrency=2
        --queues=default,signals,alerts
        --max-tasks-per-child=500
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  beat:
    image: ${IMAGE_TAG:-zora-signal-bot:latest}
    <<: *app-env
    command: >
      celery -A app.jobs.celery_app beat
        --loglevel=warning
        --scheduler celery.beat:PersistentScheduler
    volumes:
      - celerybeat_data:/var/run/celerybeat
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  celerybeat_data:
