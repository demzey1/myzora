# Run Docker Compose from this repository root:
#   c:\Users\User\Downloads\zora-signal-bot-final\zora-signal-bot
# ONE-COMMAND: docker compose up --build

x-app-env: &app-env
  env_file: .env
  environment:
    POSTGRES_HOST: db
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zora}:${POSTGRES_PASSWORD:-zora_dev_password_local}@db:5432/${POSTGRES_DB:-zora_signal}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zora_signal}
      POSTGRES_USER: ${POSTGRES_USER:-zora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zora_dev_password_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zora} -d ${POSTGRES_DB:-zora_signal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .

    <<: *app-env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .

    <<: *app-env
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .

    <<: *app-env
    command: >
      celery -A app.jobs.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=default,signals,alerts
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  beat:
    build:
      context: .

    <<: *app-env
    command: >
      celery -A app.jobs.celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./app:/app/app
      - celerybeat_data:/var/run/celerybeat
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  celerybeat_data:
