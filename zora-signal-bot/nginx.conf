# nginx.conf — Zora Signal Bot reverse proxy
# Place at: /etc/nginx/sites-available/zora-signal-bot
#
# Replace:
#   yourdomain.com        → your actual domain
#   /path/to/cert.pem     → your TLS certificate path (Let's Encrypt recommended)
#   /path/to/key.pem      → your TLS private key path

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Only expose the webhook and health endpoints externally
    # All other paths return 404 to reduce attack surface

    location /webhook/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # Telegram sends JSON payloads; cap at 1MB
        client_max_body_size 1m;
    }

    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    location /ready {
        # Only accessible from localhost (monitoring agents)
        allow  127.0.0.1;
        deny   all;
        proxy_pass http://127.0.0.1:8000/ready;
    }

    location /metrics {
        # Only accessible from localhost (Prometheus scrape)
        allow  127.0.0.1;
        deny   all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    # Block all other paths
    location / {
        return 404;
    }

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "no-referrer";
}
